<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agent Bronco{% endblock %} · CPP Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('main.home') }}" data-i18n="nav.brand">Agent Bronco</a>
    <nav class="site-header-nav" aria-label="Primary">
      <a href="{{ url_for('main.home') }}" data-i18n="nav.home">Home</a>
      <a href="{{ url_for('main.chat_page') }}" data-i18n="nav.chat">Chat</a>
      <a href="{{ url_for('main.corpus_map_page') }}" data-i18n="nav.corpus">Corpus map</a>
      <a href="{{ url_for('main.pulse_page') }}" data-i18n="nav.pulse">Campus pulse</a>
      <span class="header-lang-wrap">
        <label class="sr-only" for="headerLang" data-i18n="nav.langLabel">Site language</label>
        <select id="headerLang" class="lang-select lang-select--header" data-cpp-ui-lang aria-describedby="langTranslateNote"></select>
        <span id="langTranslateNote" class="header-lang-status muted small" role="status" aria-live="polite" hidden></span>
      </span>
    </nav>
  </header>
  <main class="container">
    {% block body %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p data-i18n="footer.disclaimer">Grounded on a crawled CPP public website corpus. Not an official Cal Poly Pomona service.</p>
    {% if index_built_at %}<p class="muted" data-i18n="footer.indexNote">Index present · verify freshness with your operator.</p>{% endif %}
  </footer>
  <script src="{{ url_for('static', filename='js/lang_select.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/ui_i18n.js') }}" defer></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
