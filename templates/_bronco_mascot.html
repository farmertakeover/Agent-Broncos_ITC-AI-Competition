<div class="billy-mascot agent-bronco {{ size_class|default('') }}" aria-hidden="true">
  {% if size_class|default('') == 'is-small' %}
  <img
    class="billy-img billy-img-head"
    src="{{ url_for('static', filename='img/horse-detective-head.png') }}"
    alt="Agent Bronco head mascot"
  />
  {% else %}
  <span class="billy-img-full-wrap">
    <img
      class="billy-img billy-img-full"
      src="{{ url_for('static', filename='img/horse-detective-full.png') }}"
      alt="Agent Bronco mascot"
    />
  </span>
  {% endif %}
  {% if not hide_caption|default(false) %}
  <span class="mascot-caption">Agent Bronco</span>
  {% endif %}
</div>
